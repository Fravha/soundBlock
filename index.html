<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sound Block</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#101010" />
    <link rel="icon" href="/src/sb-icon.png" sizes="32x32">
    <link rel="icon" href="/src/sb-icon.png" sizes="192x192">
    <link rel="apple-touch-icon" href="/src/sb-icon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #181818;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 999px;
        }

        .active-track {
            background: rgba(29, 185, 84, 0.12);
            border-left: 4px solid #1DB954;
        }

        .progress-hitbox {
            cursor: pointer;
        }

        .line-clamp-1 {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        input[type="range"] {
            accent-color: #1DB954;
        }
    </style>
</head>
<body class="bg-[#121212] text-white h-screen flex flex-col overflow-hidden">

    <header class="p-4 md:p-6 flex flex-col gap-4 bg-gradient-to-b from-[#222] to-[#121212] border-b border-[#1c1c1c]">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-2xl font-bold tracking-tight">Sound Block</h1>
                <p class="text-xs text-gray-400">Reproductor local mejorado</p>
            </div>

            <div class="flex flex-wrap justify-center gap-2">
                <label class="cursor-pointer bg-[#282828] hover:bg-[#333] text-white border border-[#444] font-semibold py-2 px-4 rounded-full transition-all text-xs">
                    + Archivos
                    <input id="file-upload" type="file" accept="audio/*" multiple class="hidden" />
                </label>

                <label class="cursor-pointer bg-[#1DB954] hover:bg-[#1ed760] text-black font-bold py-2 px-4 rounded-full transition-all transform hover:scale-105 active:scale-95 text-xs">
                    + Carpeta
                    <input id="folder-upload" type="file" webkitdirectory directory multiple class="hidden" />
                </label>

                <button id="btn-clear" class="bg-[#202020] hover:bg-[#2a2a2a] border border-[#3a3a3a] text-white font-semibold py-2 px-4 rounded-full transition-all text-xs">
                    Limpiar
                </button>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-3 items-stretch md:items-center">
            <div class="flex-1">
                <input
                    id="search-input"
                    type="text"
                    placeholder="Buscar canción..."
                    class="w-full bg-[#1a1a1a] border border-[#333] rounded-full px-4 py-2 text-sm text-white placeholder:text-gray-500 outline-none focus:border-[#1DB954]"
                />
            </div>

            <div class="flex items-center gap-3 bg-[#181818] border border-[#2a2a2a] rounded-full px-4 py-2">
                <label for="volume-control" class="text-xs text-gray-400">Volumen</label>
                <input id="volume-control" type="range" min="0" max="1" step="0.01" value="1" class="w-28" />
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto custom-scrollbar px-4 py-4">
        <div id="empty-state" class="text-center py-20 text-gray-500">
            <p class="text-5xl mb-4 flex flex-wrap items-center justify-center gap-4 md:gap-6">
                <svg width="80" height="80" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18.9983 17C18.9862 19.175 18.8897 20.3529 18.1213 21.1213C17.2426 22 15.8284 22 13 22H11C8.17157 22 6.75736 22 5.87868 21.1213C5 20.2426 5 18.8284 5 16V8C5 5.17157 5 3.75736 5.87868 2.87868C6.75736 2 8.17157 2 11 2H13C15.8284 2 17.2426 2 18.1213 2.87868C19 3.75736 19 5.17157 19 8V13" stroke="#1C274C" stroke-width="1.5" stroke-linecap="round"/>
                    <path d="M19 19.5C19.4645 19.5 19.6968 19.5 19.8911 19.4692C20.9608 19.2998 21.7998 18.4608 21.9692 17.3911C22 17.1968 22 16.9645 22 16.5V7.5C22 7.0355 22 6.80325 21.9692 6.60891C21.7998 5.53918 20.9608 4.70021 19.8911 4.53078C19.6968 4.5 19.4645 4.5 19 4.5" stroke="#1C274C" stroke-width="1.5"/>
                    <path d="M13 14V11V8" stroke="#1C274C" stroke-width="1.5" stroke-linecap="round"/>
                    <circle cx="11" cy="14" r="2" stroke="#1C274C" stroke-width="1.5"/>
                    <path d="M15 10C13.8954 10 13 9.10457 13 8" stroke="#1C274C" stroke-width="1.5" stroke-linecap="round"/>
                    <path d="M5 19.5C4.5355 19.5 4.30325 19.5 4.10891 19.4692C3.03918 19.2998 2.20021 18.4608 2.03078 17.3911C2 17.1968 2 16.9645 2 16.5V7.5C2 7.0355 2 6.80325 2.03078 6.60891C2.20021 5.53918 3.03918 4.70021 4.10891 4.53078C4.30325 4.5 4.5355 4.5 5 4.5" stroke="#1C274C" stroke-width="1.5"/>
                </svg>
            </p>
            <p class="text-base">No hay canciones cargadas</p>
            <p class="text-xs mt-2 text-gray-600">Carga archivos o una carpeta para comenzar</p>
        </div>

        <ul id="playlist" class="space-y-1 hidden"></ul>
    </main>

    <footer class="bg-[#181818] border-t border-[#282828] p-4 md:p-6">
        <div class="max-w-5xl mx-auto flex flex-col gap-4">

            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                <div class="min-w-0">
                    <h2 id="track-name" class="text-sm font-semibold line-clamp-1 text-gray-200">Selecciona una pista</h2>
                    <p id="artist-name" class="text-xs text-gray-500">Sound Block - Reproductor local</p>
                </div>

                <div class="text-xs text-gray-400">
                    <span id="playlist-count">0 canciones</span>
                </div>
            </div>

            <div class="w-full">
                <div id="progress-container" class="progress-hitbox w-full bg-[#333] h-2 rounded-full overflow-hidden relative">
                    <div id="progress-bar" class="bg-[#1DB954] h-full w-0 transition-all duration-150"></div>
                </div>

                <div class="flex justify-between text-[11px] text-gray-500 mt-2">
                    <span id="current-time">00:00</span>
                    <span id="total-time">00:00</span>
                </div>
            </div>

            <div class="flex flex-wrap items-center justify-center gap-4 md:gap-6">
                <button id="btn-shuffle" class="text-gray-400 hover:text-white transition-colors" title="Shuffle">
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path fill-rule="evenodd" clip-rule="evenodd"
                            d="M12 22C7.28595 22 4.92893 22 3.46447 20.5355C2 19.0711 2 16.714 2 12C2 7.28595 2 4.92893 3.46447 3.46447C4.92893 2 7.28595 2 12 2C16.714 2 19.0711 2 20.5355 3.46447C22 4.92893 22 7.28595 22 12C22 16.714 22 19.0711 20.5355 20.5355C19.0711 22 16.714 22 12 22ZM16.2623 7.47719C16.551 7.1802 17.0258 7.17351 17.3228 7.46225L18.5228 8.62892C18.6681 8.77013 18.75 8.96409 18.75 9.16667C18.75 9.36924 18.6681 9.5632 18.5228 9.70441L17.3228 10.8711C17.0258 11.1598 16.551 11.1531 16.2623 10.8561C16.011 10.5977 15.9834 10.2046 16.1762 9.91667H15.8383C15.3265 9.91667 14.9944 9.91744 14.7373 9.94173C14.4955 9.96458 14.3787 10.0042 14.294 10.0509C14.2102 10.0969 14.1178 10.1718 13.9758 10.3582C13.8236 10.5581 13.6532 10.8325 13.3896 11.2598L11.8693 13.7233C11.6282 14.1138 11.4197 14.4518 11.2175 14.7172C11.0002 15.0026 10.7583 15.2488 10.4294 15.4299C10.1015 15.6104 9.76303 15.6843 9.40387 15.7183C9.06785 15.75 8.66434 15.75 8.1946 15.75L6 15.75C5.58579 15.75 5.25 15.4142 5.25 15C5.25 14.5858 5.58579 14.25 6 14.25H8.16171C8.67346 14.25 9.00564 14.2492 9.26275 14.2249C9.50453 14.2021 9.62126 14.1625 9.70604 14.1158C9.78978 14.0697 9.88225 13.9948 10.0242 13.8085C10.1764 13.6086 10.3468 13.3341 10.6104 12.9068L12.1307 10.4434C12.3717 10.0528 12.5803 9.71485 12.7825 9.44943C12.9998 9.16404 13.2417 8.91784 13.5706 8.73678C13.8985 8.55631 14.237 8.48233 14.5961 8.44839C14.9322 8.41663 15.3357 8.41665 15.8054 8.41667L16.1762 8.41667C15.9834 8.12871 16.011 7.73562 16.2623 7.47719ZM9.38531 9.76916C9.30046 9.7531 9.19932 9.75 8.80057 9.75H6C5.58579 9.75 5.25 9.41421 5.25 9C5.25 8.58579 5.58579 8.25 6 8.25H8.80057L8.85843 8.24998C9.17103 8.24981 9.42305 8.24968 9.66421 8.29532C10.2033 8.39734 10.6972 8.66783 11.0694 9.07011C11.2363 9.25039 11.3679 9.4639 11.5278 9.72348L11.5582 9.77278C11.7758 10.1253 11.6664 10.5874 11.3139 10.8049C10.9614 11.0224 10.4993 10.913 10.2818 10.5606C10.0759 10.2269 10.0234 10.1482 9.96852 10.0889C9.81783 9.92609 9.61368 9.81237 9.38531 9.76916ZM12.6861 13.0284C13.0386 12.8109 13.5007 12.9203 13.7182 13.2728C13.9241 13.6064 13.9766 13.6851 14.0315 13.7444C14.1822 13.9072 14.3863 14.021 14.6147 14.0642C14.6995 14.0802 14.8007 14.0833 15.1994 14.0833H16.1762C15.9834 13.7954 16.011 13.4023 16.2623 13.1439C16.551 12.8469 17.0258 12.8402 17.3228 13.1289L18.5228 14.2956C18.6681 14.4368 18.75 14.6308 18.75 14.8333C18.75 15.0359 18.6681 15.2299 18.5228 15.3711L17.3228 16.5377C17.0258 16.8265 16.551 16.8198 16.2623 16.5228C16.011 16.2644 15.9834 15.8713 16.1762 15.5833H15.1994L15.1416 15.5834C14.829 15.5835 14.5769 15.5837 14.3358 15.538C13.7967 15.436 13.3028 15.1655 12.9306 14.7632C12.7637 14.5829 12.6321 14.3694 12.4722 14.1098L12.4418 14.0606C12.2242 13.7081 12.3336 13.246 12.6861 13.0284Z"
                            fill="currentColor"/>
                    </svg>
                </button>

                <button id="btn-prev" class="text-gray-400 hover:text-white transition-colors" title="Anterior">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M4.5 4a.5.5 0 0 0-.5.5v7a.5.5 0 0 0 1 0V8.252l6.267 4.136c.52.3 1.233-.075 1.233-.676V4.288c0-.601-.713-.976-1.233-.676L5 7.748V4.5A.5.5 0 0 0 4.5 4z"/>
                    </svg>
                </button>

                <button id="btn-play-pause" class="bg-white text-black p-3 rounded-full hover:scale-110 transition-transform" title="Reproducir / Pausar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M11.596 8.697l-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/>
                    </svg>
                </button>

                <button id="btn-next" class="text-gray-400 hover:text-white transition-colors" title="Siguiente">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M11.5 4a.5.5 0 0 1 .5.5v7a.5.5 0 0 1-1 0V8.252L4.733 12.388C4.213 12.688 3.5 12.313 3.5 11.712V4.288c0-.601.713-.976 1.233-.676L11 7.748V4.5a.5.5 0 0 1 .5-.5z"/>
                    </svg>
                </button>

                <button id="btn-repeat" class="text-gray-400 hover:text-white transition-colors" title="Repetir">
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M8.71597 3.20277C8.98843 2.93241 9.43017 2.93241 9.70263 3.20277L11.5631 5.04893C11.7626 5.24692 11.8223 5.5447 11.7143 5.8034C11.6063 6.06209 11.352 6.23077 11.0698 6.23077H9.2093C5.99834 6.23077 3.39535 8.81374 3.39535 12C3.39535 15.1862 5.99857 17.7692 9.20956 17.7692H9.67442C10.0597 17.7692 10.3721 18.0792 10.3721 18.4615C10.3721 18.8439 10.0597 19.1538 9.67442 19.1538H9.20956C5.22801 19.1538 2 15.951 2 12C2 8.04904 5.22771 4.84615 9.2093 4.84615H9.38543L8.71597 4.18184C8.44351 3.91148 8.44351 3.47314 8.71597 3.20277Z" fill="currentColor"/>
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M13.6279 5.53846C13.6279 5.15611 13.9403 4.84615 14.3256 4.84615H14.7907C18.7723 4.84615 22 8.04904 22 12C22 15.951 18.7723 19.1538 14.7907 19.1538H14.6146L15.284 19.8182C15.5565 20.0885 15.5565 20.5269 15.284 20.7972C15.0116 21.0676 14.5698 21.0676 14.2974 20.7972L12.4369 18.9511C12.2374 18.7531 12.1777 18.4553 12.2857 18.1966C12.3937 17.9379 12.648 17.7692 12.9302 17.7692H14.7907C18.0017 17.7692 20.6047 15.1863 20.6047 12C20.6047 8.81374 18.0017 6.23077 14.7907 6.23077H14.3256C13.9403 6.23077 13.6279 5.92081 13.6279 5.53846Z" fill="currentColor"/>
                        <path d="M5.48837 12C5.48837 9.96079 7.15429 8.30769 9.2093 8.30769H14.7907C16.8457 8.30769 18.5116 9.96079 18.5116 12C18.5116 14.0392 16.8457 15.6923 14.7907 15.6923H9.2093C7.15429 15.6923 5.48837 14.0392 5.48837 12Z" fill="currentColor"/>
                    </svg>
                </button>
            </div>

            <p class="text-center text-[11px] text-gray-600">
                Atajos: Espacio = play/pausa, → = siguiente, ← = anterior, M = shuffle, R = repetir
            </p>
        </div>
    </footer>

    <audio id="audio-element"></audio>
    <script src="app.js"></script>
</body>
</html>
